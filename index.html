<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상상도어 — 운명의 문을 열다</title>
<style>
  :root {
    --p: 0;            /* 전체 스크롤 진행도 0~1 (raw) */
    --door: 0;         /* 문 열림 진행도 0~1 (eased) */
    --cards: 0;        /* 카드 등장 진행도 0~1 (eased) */
    --s: 1;            /* 스테이지 cover 스케일 */
    --gold: #f2d7ac;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: #01040f;
    color: var(--gold);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* ── 스크롤 핀 구간 ───────────────────────── */
  .hero-scroll {
    position: relative;
    height: 320vh;            /* 이 구간 동안 문이 열림 */
  }

  .hero {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    background: #01040f;
  }

  /* ── 1920x1080 고정 스테이지 (스케일로 cover) ── */
  .stage {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(var(--s));
    transform-origin: center center;
  }

  .layer {
    position: absolute;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform, opacity, filter;
  }

  /* 배경 */
  .bg {
    left: 0; top: 0; width: 1920px; height: 1080px;
    object-fit: cover;
    transform: scale(calc(1 + var(--p) * 0.06));
    transform-origin: center center;
  }

  /* 문 내부 황금빛 */
  .door-bg {
    left: 463px; top: 0; width: 994px; height: 1080px;
    object-fit: cover;
    filter: brightness(calc(0.82 + var(--door) * 0.28));
    opacity: calc(0.55 + var(--door) * 0.45);
  }

  /* 문 안쪽에서 새어나오는 빛 (문이 열릴수록 강해짐) */
  .door-glow {
    left: 760px; top: 120px; width: 400px; height: 840px;
    background: radial-gradient(ellipse at center,
        rgba(255, 236, 190, 0.55) 0%,
        rgba(255, 220, 150, 0.25) 35%,
        rgba(255, 210, 130, 0) 70%);
    opacity: var(--door);
    filter: blur(6px);
    pointer-events: none;
  }

  /* ── 카드 ─────────────────────────────────── */
  .card {
    width: 164px; height: 257px;
    /* 바깥 래퍼: 스크롤 진행 transform 담당 */
    transform:
      translate(var(--cx), var(--cy))
      rotate(var(--crot))
      scale(var(--cscale));
    opacity: var(--copacity);
  }
  .card img {
    display: block;
    width: 100%; height: 100%;
    border-radius: 12px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55),
                0 0 40px rgba(255, 220, 160, calc(var(--cards) * 0.35));
    /* 안쪽: 무한 드리프트 (스크롤과 충돌 안 하도록 분리) */
    animation: floatY var(--fdur) ease-in-out var(--fdelay) infinite,
               floatTilt calc(var(--fdur) * 1.6) ease-in-out var(--fdelay) infinite;
  }

  @keyframes floatY {
    0%, 100% { transform: translateY(-10px); }
    50%      { transform: translateY(12px); }
  }
  @keyframes floatTilt {
    0%, 100% { rotate: -1.5deg; }
    50%      { rotate: 1.5deg; }
  }

  /* 문짝 */
  .door-left {
    left: 732px; top: 128px; width: 233px; height: 895px;
    transform: translateX(calc(var(--door) * -470px));
    filter: brightness(calc(1 - var(--door) * 0.15));
  }
  .door-right {
    left: 965px; top: 129px; width: 232px; height: 890px;
    transform: translateX(calc(var(--door) * 470px));
    filter: brightness(calc(1 - var(--door) * 0.15));
  }

  /* 프레임 (최상단, 중앙 투명) */
  .frame {
    left: 0; top: 0; width: 1920px; height: 1080px;
    pointer-events: none;
  }

  /* ── UI 오버레이 ──────────────────────────── */
  .logo {
    left: 71px; top: 40px; width: 151px; height: 59px;
    opacity: calc(1 - var(--p) * 0.6);
  }

  .qbtn {
    left: 1639px; top: 39px; width: 131px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    border-radius: 22px;
    background: var(--gold);
    color: #01071b;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    opacity: calc(1 - var(--p) * 1.4);
    transition: filter .2s ease;
    text-decoration: none;
  }
  .qbtn:hover { filter: brightness(1.08); }

  /* 메인 카피 (문이 닫혔을 때 중앙) */
  .headline {
    left: 50%; top: 300px;
    transform: translateX(-50%);
    width: 900px;
    text-align: center;
    opacity: calc(1 - var(--p) * 1.8);
    pointer-events: none;
  }
  .headline h1 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 6px;
    text-shadow: 0 2px 24px rgba(0,0,0,.6);
  }
  .headline p {
    margin-top: 18px;
    font-size: 20px;
    letter-spacing: 3px;
    color: #e8d4b0;
    opacity: .85;
  }

  /* 스크롤 힌트 (하단 중앙) */
  .scroll-hint {
    left: 50%; bottom: 56px; top: auto;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    color: var(--gold);
    font-size: 15px; letter-spacing: 4px;
    opacity: calc(1 - var(--p) * 3);
    pointer-events: none;
  }
  .scroll-hint .chev {
    width: 22px; height: 22px;
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    transform: rotate(45deg);
    animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: rotate(45deg) translate(0, 0); opacity: .4; }
    50%      { transform: rotate(45deg) translate(4px, 4px); opacity: 1; }
  }

  /* 문이 다 열린 뒤 등장하는 카피 */
  .reveal-copy {
    left: 50%; bottom: 70px; top: auto;
    transform: translateX(-50%);
    width: 900px; text-align: center;
    opacity: calc((var(--cards) - 0.4) * 2);
    pointer-events: none;
  }
  .reveal-copy h2 {
    font-size: 34px; font-weight: 700; letter-spacing: 5px;
    text-shadow: 0 2px 20px rgba(0,0,0,.55);
  }
  .reveal-copy p { margin-top: 12px; font-size: 17px; letter-spacing: 3px; opacity: .8; }

  /* ── 다음 섹션 (스크롤이 더 있다는 걸 보여주기 위한 자리) ── */
  .next {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #0a1330 0%, #01040f 60%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 40px;
  }
  .next h2 { font-size: 40px; letter-spacing: 6px; font-weight: 700; }
  .next p { font-size: 18px; letter-spacing: 2px; opacity: .7; max-width: 620px; line-height: 1.9; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .card img, .scroll-hint .chev { animation: none; }
  }
</style>
</head>
<body>

  <section class="hero-scroll" id="heroScroll">
    <div class="hero">
      <div class="stage" id="stage">

        <!-- 1. 배경 -->
        <img class="layer bg" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/background.png" alt="" />

        <!-- 2. 문 내부 황금빛 -->
        <img class="layer door-bg" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/door_bg.png" alt="" />
        <div class="layer door-glow"></div>

        <!-- 3. 카드 ×3 (문 안쪽) -->
        <div class="layer card" id="cardA" style="left:688px; top:482px; --fdur:6.5s; --fdelay:0s;">
          <img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" />
        </div>
        <div class="layer card" id="cardB" style="left:881px; top:576px; --fdur:8s; --fdelay:.6s;">
          <img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" />
        </div>
        <div class="layer card" id="cardC" style="left:1068px; top:476px; --fdur:7.2s; --fdelay:1.1s;">
          <img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" />
        </div>

        <!-- 4. 문짝 -->
        <img class="layer door-left"  src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/left_door.png"  alt="" />
        <img class="layer door-right" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/right_door.png" alt="" />

        <!-- 5. 프레임 (최상단, 중앙 투명) -->
        <img class="layer frame" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/door_line.png" alt="" />

        <!-- 6. UI 오버레이 -->
        <img class="layer logo" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/logo.png" alt="상상도어" />
        <a class="layer qbtn" href="#" aria-label="안내">? 안내</a>

        <div class="layer headline">
          <h1>운명의 문을 열다</h1>
          <p>스크롤하여 당신의 카드를 만나보세요</p>
        </div>

        <div class="layer scroll-hint">
          <span>SCROLL</span>
          <span class="chev"></span>
        </div>

        <div class="layer reveal-copy">
          <h2>당신을 위한 세 장의 카드</h2>
          <p>마음이 이끄는 카드를 선택하세요</p>
        </div>

      </div>
    </div>
  </section>

  <section class="next">
    <h2>상상도어</h2>
    <p>문 너머의 이야기가 여기서 이어집니다. 이 영역에 다음 콘텐츠 섹션을 자유롭게 배치하세요.</p>
  </section>

<script>
(function () {
  var heroScroll = document.getElementById('heroScroll');
  var stage = document.getElementById('stage');
  var root = document.documentElement;

  var cards = [
    // [el, 시작 x오프셋(중앙으로 모음), 시작 y오프셋, 목표 회전(deg), 등장 시작p, 등장 끝p]
    { el: document.getElementById('cardA'), dx: 200,  dy: 150, rot: -7, s0: 0.34, s1: 0.78 },
    { el: document.getElementById('cardB'), dx: 0,    dy: 170, rot:  0, s0: 0.40, s1: 0.86 },
    { el: document.getElementById('cardC'), dx: -185, dy: 150, rot:  7, s0: 0.30, s1: 0.74 }
  ];

  function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  // 구간 [a,b]에서의 0~1 진행도
  function range(p, a, b) { return clamp((p - a) / (b - a), 0, 1); }

  function resize() {
    var s = Math.max(window.innerWidth / 1920, window.innerHeight / 1080);
    root.style.setProperty('--s', s);
  }

  var ticking = false;
  function onScroll() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  }

  function update() {
    ticking = false;

    var rect = heroScroll.getBoundingClientRect();
    var scrollable = heroScroll.offsetHeight - window.innerHeight;
    var p = scrollable > 0 ? clamp(-rect.top / scrollable, 0, 1) : 0;

    root.style.setProperty('--p', p.toFixed(4));

    // 문 열림: p 0 → 0.62 구간
    var door = easeInOutCubic(range(p, 0.0, 0.62));
    root.style.setProperty('--door', door.toFixed(4));

    // 카드 전체 진행도 (글로우/그림자 강도용)
    var cardsGlobal = range(p, 0.30, 0.86);
    root.style.setProperty('--cards', cardsGlobal.toFixed(4));

    // 카드 개별 등장
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var t = easeInOutCubic(range(p, c.s0, c.s1));
      var cx = (1 - t) * c.dx;          // 중앙 근처 → 제자리
      var cy = (1 - t) * c.dy;          // 아래에서 떠오름
      var scale = 0.8 + t * 0.2;
      var rot = c.rot * t;
      var st = c.el.style;
      st.setProperty('--cx', cx.toFixed(1) + 'px');
      st.setProperty('--cy', cy.toFixed(1) + 'px');
      st.setProperty('--cscale', scale.toFixed(3));
      st.setProperty('--crot', rot.toFixed(2) + 'deg');
      st.setProperty('--copacity', t.toFixed(3));
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', function () { resize(); update(); });
  window.addEventListener('load', function () { resize(); update(); });
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) { ticking = false; resize(); update(); }
  });

  resize();
  update();
})();
</script>
</body>
</html>
