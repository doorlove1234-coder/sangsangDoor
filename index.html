<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상상도어 — 운명의 문을 열다</title>
<style>
  :root {
    --p: 0;            /* 전체 스크롤 진행도 0~1 (raw) */
    --door: 0;         /* 문 열림 진행도 0~1 (eased) */
    --cards: 0;        /* 카드 등장 진행도 0~1 (eased) */
    --s: 1;            /* 스테이지 cover 스케일 */
    --gold: #f2d7ac;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: #01040f;
    color: var(--gold);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* ── 스크롤 핀 구간 ───────────────────────── */
  /* 높이가 클수록 히어로가 화면에 고정(pin)된 채 스크롤되는 거리가 길어진다.
     문 열림+카드 등장은 앞부분에서 끝나고, 나머지는 '고정 유지(hold)' 구간이라
     카드가 다 나온 뒤에도 화면이 안 내려가고 카드가 날아다니는 걸 볼 수 있다. */
  .hero-scroll {
    position: relative;
    height: 360vh;
  }

  .hero {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    background: #01040f;
  }

  /* ── 1920x1080 고정 스테이지 (스케일로 cover) ── */
  .stage {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(var(--s));
    transform-origin: center center;
  }

  .layer {
    position: absolute;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform, opacity, filter;
  }

  /* 배경 — 장면이 드러나는 동안(0~0.62)에만 부드럽게 줌인하고, 고정 유지 구간에선
     더 커지지 않는다(creep 방지). transition으로 스크롤 단계 점프를 매끄럽게. */
  .bg {
    left: 0; top: 0; width: 1920px; height: 1080px;
    object-fit: cover;
    transform: scale(calc(1 + var(--reveal, 0) * 0.08));
    transform-origin: center center;
    transition: transform 0.5s ease-out;
  }

  /* 문 내부 황금빛 */
  .door-bg {
    left: 463px; top: 0; width: 994px; height: 1080px;
    object-fit: cover;
    filter: brightness(calc(0.82 + var(--door) * 0.28));
    opacity: calc(0.55 + var(--door) * 0.45);
  }

  /* 문 안쪽에서 새어나오는 빛 (문이 열릴수록 강해짐) */
  .door-glow {
    left: 760px; top: 120px; width: 400px; height: 840px;
    background: radial-gradient(ellipse at center,
        rgba(255, 236, 190, 0.55) 0%,
        rgba(255, 220, 150, 0.25) 35%,
        rgba(255, 210, 130, 0) 70%);
    opacity: var(--door);
    filter: blur(6px);
    pointer-events: none;
  }

  /* ── 카드 캐러셀 (문이 열린 뒤 자동으로 오른쪽으로 순환) ── */
  .carousel {
    left: 0; top: 0; width: 1920px; height: 1080px;
    perspective: 1500px;
    perspective-origin: 50% 42%;
    opacity: var(--cards);             /* 문이 열릴수록 나타남 */
    transition: opacity .35s ease;
    pointer-events: none;
  }
  /* 각 카드 바깥 래퍼: 좌→우 이동 + 코버플로(scale/rotateY) = '오른쪽으로 돌며 교체' */
  .cwrap {
    position: absolute;
    top: 470px; left: 0;
    width: 164px; height: 257px;
    animation: carousel var(--cdur, 24s) linear var(--cdelay, 0s) infinite;
    will-change: transform, opacity;
  }
  /* 안쪽 래퍼: 지금과 동일한 위아래 흔들림 유지 (이동/회전과 분리) */
  .cfloat {
    width: 100%; height: 100%;
    animation: floatY var(--fdur, 6.5s) ease-in-out var(--fdelay, 0s) infinite,
               floatTilt calc(var(--fdur, 6.5s) * 1.6) ease-in-out var(--fdelay, 0s) infinite;
  }
  .cfloat img {
    display: block;
    width: 100%; height: 100%;
    border-radius: 12px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55),
                0 0 42px rgba(255, 220, 160, calc(var(--cards) * 0.4));
  }

  /* 좌측 기둥(412~744) 뒤에서 나와 우측 기둥(1184~1516) 뒤로 사라지며 무한 반복.
     양 끝(translateX 412/1352)은 기둥에 가려지고 opacity 0이라 순환 점프가 보이지 않는다.
     이동 폭을 넓혀(940px) 카드 간격이 예전처럼 넓게 보인다. */
  @keyframes carousel {
    0%   { transform: translateX(412px)  scale(.80) rotateY(34deg);  opacity: 0; }
    12%  { opacity: 1; }
    50%  { transform: translateX(882px)  scale(1.06) rotateY(0deg);  opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translateX(1352px) scale(.80) rotateY(-34deg); opacity: 0; }
  }

  @keyframes floatY {
    0%, 100% { transform: translateY(-10px); }
    50%      { transform: translateY(12px); }
  }
  @keyframes floatTilt {
    0%, 100% { rotate: -1.5deg; }
    50%      { rotate: 1.5deg; }
  }

  /* ── 문짝 (3D 경첩 스윙) ───────────────────────
     사람이 양손으로 미는 것처럼, 양쪽 문이 바깥쪽 세로 모서리(경첩)를
     축으로 안쪽(화면 안)으로 회전하며 열린다. */
  .door-scene {
    left: 0; top: 0; width: 1920px; height: 1080px;
    perspective: 2200px;
    perspective-origin: 50% 45%;
    pointer-events: none;
  }
  .door-scene img {
    position: absolute;
    display: block;
    backface-visibility: visible;
    will-change: transform, filter;
    -webkit-user-drag: none;
  }
  /* 왼쪽 문: 왼쪽 모서리가 경첩, 안쪽으로 밀려 열림 */
  .door-left {
    left: 732px; top: 128px; width: 233px; height: 895px;
    transform-origin: left center;
    transform: rotateY(calc(var(--door) * 100deg));
    filter: brightness(calc(1 - var(--door) * 0.28));
  }
  /* 오른쪽 문: 오른쪽 모서리가 경첩, 반대 방향으로 밀려 열림 */
  .door-right {
    left: 965px; top: 129px; width: 232px; height: 890px;
    transform-origin: right center;
    transform: rotateY(calc(var(--door) * -100deg));
    filter: brightness(calc(1 - var(--door) * 0.28));
  }

  /* 프레임 (최상단, 중앙 투명) */
  .frame {
    left: 0; top: 0; width: 1920px; height: 1080px;
    pointer-events: none;
  }

  /* 문틀(기둥) 클릭 영역 — 완전히 열렸을 때만 클릭으로 문을 닫는다.
     상단 메뉴 영역(y<128)은 건드리지 않도록 기둥 높이에 맞춘다. */
  .door-trigger {
    top: 128px; height: 895px; width: 332px;
    pointer-events: none;            /* 닫힘 상태에선 클릭 무시 */
  }
  .door-trigger.left  { left: 412px; }
  .door-trigger.right { left: 1184px; }
  .stage.is-open .door-trigger {
    pointer-events: auto;
    cursor: pointer;                 /* 열린 상태에서만 클릭 가능 */
  }
  /* 닫힌 문 클릭 영역 — 닫혀 있을 때 클릭하면 문이 열린다 (스크롤 방식은 그대로 유지) */
  .door-open-trigger {
    left: 744px; top: 150px; width: 440px; height: 880px;
    pointer-events: auto;
    cursor: pointer;
  }
  .stage.is-open .door-open-trigger {
    pointer-events: none;            /* 열린 뒤엔 비활성(카드/닫기 클릭 방해 안 함) */
    cursor: default;
  }

  /* ── UI 오버레이 ──────────────────────────── */
  /* 로고는 스크롤해도 항상 보이도록 (페이드 제거) */
  .logo {
    left: 71px; top: 40px; width: 151px; height: 59px;
  }

  /* 상단 중앙 메뉴 */
  .topnav {
    left: 0; top: 39px; width: 1920px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    gap: 52px;
    pointer-events: auto;
  }
  .topnav a {
    color: #efe6d4;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 2px;
    text-decoration: none;
    white-space: nowrap;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    transition: color .2s ease;
  }
  .topnav a:hover { color: var(--gold); }

  .qbtn {
    left: 1639px; top: 39px; width: 131px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    border-radius: 22px;
    background: var(--gold);
    color: #01071b;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    transition: filter .2s ease;       /* 스크롤해도 항상 보이도록 페이드 제거 */
    text-decoration: none;
  }
  .qbtn:hover { filter: brightness(1.08); }

  /* 메인 카피 (문이 닫혔을 때 중앙) */
  .headline {
    left: 50%; top: 300px;
    transform: translateX(-50%);
    width: 900px;
    text-align: center;
    opacity: calc(1 - var(--p) * 1.8);
    pointer-events: none;
  }
  .headline h1 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 6px;
    text-shadow: 0 2px 24px rgba(0,0,0,.6);
  }
  .headline p {
    margin-top: 18px;
    font-size: 20px;
    letter-spacing: 3px;
    color: #e8d4b0;
    opacity: .85;
  }

  /* 스크롤 힌트 (하단 중앙) */
  .scroll-hint {
    left: 50%; bottom: 56px; top: auto;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    color: var(--gold);
    font-size: 15px; letter-spacing: 4px;
    opacity: calc(1 - var(--p) * 3);
    pointer-events: none;
  }
  .scroll-hint .chev {
    width: 22px; height: 22px;
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    transform: rotate(45deg);
    animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: rotate(45deg) translate(0, 0); opacity: .4; }
    50%      { transform: rotate(45deg) translate(4px, 4px); opacity: 1; }
  }

  /* 문이 다 열린 뒤 등장하는 카피 */
  .reveal-copy {
    left: 50%; bottom: 70px; top: auto;
    transform: translateX(-50%);
    width: 900px; text-align: center;
    opacity: calc((var(--cards) - 0.4) * 2);
    pointer-events: none;
  }
  .reveal-copy h2 {
    font-size: 34px; font-weight: 700; letter-spacing: 5px;
    text-shadow: 0 2px 20px rgba(0,0,0,.55);
  }
  .reveal-copy p { margin-top: 12px; font-size: 17px; letter-spacing: 3px; opacity: .8; }

  /* ── 다음 섹션 (스크롤이 더 있다는 걸 보여주기 위한 자리) ── */
  .next {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #0a1330 0%, #01040f 60%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 40px;
  }
  .next h2 { font-size: 40px; letter-spacing: 6px; font-weight: 700; }
  .next p { font-size: 18px; letter-spacing: 2px; opacity: .7; max-width: 620px; line-height: 1.9; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .card img, .scroll-hint .chev { animation: none; }
  }
</style>
</head>
<body>

  <section class="hero-scroll" id="heroScroll">
    <div class="hero">
      <div class="stage" id="stage">

        <!-- 1. 배경 -->
        <img class="layer bg" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/background.png" alt="" />

        <!-- 2. 문 내부 황금빛 -->
        <img class="layer door-bg" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/door_bg.png" alt="" />
        <div class="layer door-glow"></div>

        <!-- 3. 문짝 (3D 경첩 스윙 / 카드보다 뒤에 그려져 열리면 카드가 드러남) -->
        <div class="layer door-scene">
          <img class="door-left"  src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/left_door.png"  alt="" />
          <img class="door-right" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/right_door.png" alt="" />
        </div>

        <!-- 4. 카드 캐러셀 (여러 장이 자동으로 오른쪽으로 순환, 간격 넓게) -->
        <div class="layer carousel" id="carousel">
          <div class="cwrap" style="--cdur:24s; --cdelay:0s;     --fdur:6.5s; --fdelay:0s;">  <div class="cfloat"><img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" /></div></div>
          <div class="cwrap" style="--cdur:24s; --cdelay:-4.8s;  --fdur:7.2s; --fdelay:.5s;"> <div class="cfloat"><img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" /></div></div>
          <div class="cwrap" style="--cdur:24s; --cdelay:-9.6s;  --fdur:8s;   --fdelay:1s;">  <div class="cfloat"><img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" /></div></div>
          <div class="cwrap" style="--cdur:24s; --cdelay:-14.4s; --fdur:6.8s; --fdelay:1.5s;"><div class="cfloat"><img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" /></div></div>
          <div class="cwrap" style="--cdur:24s; --cdelay:-19.2s; --fdur:7.6s; --fdelay:.3s;"> <div class="cfloat"><img src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/card.png" alt="카드" /></div></div>
        </div>

        <!-- 5. 프레임 (최상단, 중앙 투명) -->
        <img class="layer frame" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/door_line.png" alt="" />

        <!-- 닫힌 문 클릭 영역 (닫혀 있을 때 클릭 시 문 열기) -->
        <div class="layer door-open-trigger" title="문 열기" aria-label="문 열기" role="button"></div>

        <!-- 문틀 클릭 영역 (열린 상태에서 클릭 시 문 닫기) -->
        <div class="layer door-trigger left"  title="문 닫기" aria-label="문 닫기" role="button"></div>
        <div class="layer door-trigger right" title="문 닫기" aria-label="문 닫기" role="button"></div>

        <!-- 6. UI 오버레이 -->
        <img class="layer logo" src="https://raw.githubusercontent.com/doorlove1234-coder/sangsangDoor/main/logo.png" alt="상상도어" />

        <nav class="layer topnav">
          <a href="#">상상의 문</a>
          <a href="#">테마</a>
          <a href="#">예약</a>
          <a href="#">매장안내</a>
          <a href="#">공지</a>
        </nav>

        <a class="layer qbtn" href="#" aria-label="예약 확인">예약 확인</a>

        <div class="layer headline">
          <h1>운명의 문을 열다</h1>
          <p>스크롤하여 당신의 카드를 만나보세요</p>
        </div>

        <div class="layer scroll-hint">
          <span>SCROLL</span>
          <span class="chev"></span>
        </div>

        <div class="layer reveal-copy">
          <h2>당신을 위한 세 장의 카드</h2>
          <p>마음이 이끄는 카드를 선택하세요</p>
        </div>

      </div>
    </div>
  </section>

  <section class="next">
    <h2>상상도어</h2>
    <p>문 너머의 이야기가 여기서 이어집니다. 이 영역에 다음 콘텐츠 섹션을 자유롭게 배치하세요.</p>
  </section>

<script>
(function () {
  var heroScroll = document.getElementById('heroScroll');
  var stage = document.getElementById('stage');
  var root = document.documentElement;
  var lastDoor = 0, isAnimating = false;

  function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  // 구간 [a,b]에서의 0~1 진행도
  function range(p, a, b) { return clamp((p - a) / (b - a), 0, 1); }

  function resize() {
    var s = Math.max(window.innerWidth / 1920, window.innerHeight / 1080);
    root.style.setProperty('--s', s);
  }

  var ticking = false;
  function onScroll() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  }

  function update() {
    ticking = false;

    var rect = heroScroll.getBoundingClientRect();
    var scrollable = heroScroll.offsetHeight - window.innerHeight;
    var p = scrollable > 0 ? clamp(-rect.top / scrollable, 0, 1) : 0;

    root.style.setProperty('--p', p.toFixed(4));

    // 배경 줌용 진행도: 장면이 드러나는 0~0.62 구간에만 이징으로 증가, 이후 고정.
    root.style.setProperty('--reveal', easeInOutCubic(range(p, 0.0, 0.62)).toFixed(4));

    // 문 열림: p 0 → 0.42 (핀 구간 앞부분에서 완전히 열림)
    var door = easeInOutCubic(range(p, 0.0, 0.42));
    root.style.setProperty('--door', door.toFixed(4));
    lastDoor = door;
    stage.classList.toggle('is-open', door > 0.95);   // 완전히 열렸을 때만 문틀 클릭 활성화

    // 카드 캐러셀 등장: p 0.30 → 0.62 에 완전히 나옴.
    // 그 이후(0.62 → 1.0)는 변화 없는 '고정 유지' 구간 → 화면 고정 + 카드만 날아다님.
    var cardsGlobal = range(p, 0.30, 0.62);
    root.style.setProperty('--cards', cardsGlobal.toFixed(4));
  }

  // 스크롤 위치를 목표값까지 부드럽게 애니메이션 → 스크롤 기반 문 열림/닫힘을 재생
  function animateScrollTo(targetY, dur) {
    if (isAnimating) return;
    var startY = window.pageYOffset || document.documentElement.scrollTop;
    if (Math.abs(targetY - startY) < 2) return;
    isAnimating = true;
    root.style.scrollBehavior = 'auto';        // 수동 스크롤이 이중 부드러움 안 타도록
    var t0 = null;
    function stepFn(ts) {
      if (t0 === null) t0 = ts;
      var k = clamp((ts - t0) / dur, 0, 1);
      var e = easeInOutCubic(k);
      window.scrollTo(0, Math.round(startY + (targetY - startY) * e));
      update();
      if (k < 1) { requestAnimationFrame(stepFn); }
      else { isAnimating = false; root.style.scrollBehavior = ''; }
    }
    requestAnimationFrame(stepFn);
  }

  // 문 열기: 닫힌 문을 클릭하면 스크롤을 '카드가 다 나오는 지점'까지 보내 열림 스윙 재생
  function openDoors() {
    var scrollable = heroScroll.offsetHeight - window.innerHeight;
    animateScrollTo(heroScroll.offsetTop + scrollable * 0.65, 1400);
  }

  // 문 닫기: 스크롤을 히어로 상단으로 되돌려 '열림 애니메이션을 그대로 역재생'
  // → 양문이 경첩을 중심으로 다시 닫히는 3D 스윙(양손으로 닫는 동작)
  function closeDoors() {
    animateScrollTo(heroScroll.offsetTop, 1100);
  }

  var triggers = document.querySelectorAll('.door-trigger');
  for (var ti = 0; ti < triggers.length; ti++) {
    triggers[ti].addEventListener('click', function () {
      if (lastDoor > 0.95) closeDoors();   // 완전히 열린 상태에서 문틀 클릭 시에만 닫힘
    });
  }

  var openTrigger = document.querySelector('.door-open-trigger');
  if (openTrigger) {
    openTrigger.addEventListener('click', function () {
      if (lastDoor < 0.9) openDoors();     // 닫혀 있을 때 문 클릭 시 열림
    });
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', function () { resize(); update(); });
  window.addEventListener('load', function () { resize(); update(); });
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) { ticking = false; resize(); update(); }
  });

  resize();
  update();
})();
</script>
</body>
</html>
